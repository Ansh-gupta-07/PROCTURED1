<body>
  <div id="error-boundary" style="color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: white; padding: 20px; display: none;"></div>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      var errDiv = document.getElementById('error-boundary');
      errDiv.style.display = 'block';
      errDiv.innerText += msg + '\n' + (error && error.stack ? error.stack : '') + '\n\n';
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      var errDiv = document.getElementById('error-boundary');
      errDiv.style.display = 'block';
      errDiv.innerText += 'Unhandled Rejection: ' + event.reason + '\n\n';
    });
  </script>
  <div id="root"></div>
</body>
